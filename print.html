<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TATEmd 印刷</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #faf9f7;
        font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
      }
      .print-status {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #333;
        padding: 24px;
      }
      .print-status button {
        padding: 10px 22px;
        border: none;
        border-radius: 8px;
        background: #16a34a;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }
      .print-status .muted {
        color: #777;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="print-status" id="status">
      <div>Vivliostyle で縦書きを組版中…</div>
      <div class="muted">完了すると印刷ダイアログが開きます（複数ページの縦書き PDF）。</div>
    </div>
    <script type="module" src="/src/print/main.ts"></script>
  </body>
</html>
