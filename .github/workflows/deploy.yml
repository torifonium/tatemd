name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新の1つだけにする（古いデプロイは打ち切り）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 品質ゲート（型・テスト・lint）を通してからビルド
      - run: npm run lint
      - run: npm test
      - run: npm run build # GITHUB_ACTIONS=true のとき base=/tatemd/
      - uses: actions/configure-pages@v5
        with:
          enablement: true # Pages 未設定でも自動で有効化（source=GitHub Actions）
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
