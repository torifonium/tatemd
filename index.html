<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TATEmd</title>
    <link rel="stylesheet" href="/src/styles/app.css" />
    <link rel="stylesheet" href="/src/styles/vertical.css" />
  </head>
  <!-- DOM 構造は design.md「印刷」節で確定したものに準拠（印刷抽出対象 = .tategaki） -->
  <body data-paper="a5">
    <header class="app-header">
      <h1 class="app-title">TATEmd</h1>
      <div class="app-actions">
        <!-- 用紙切替（A5/B6）・印刷ボタンは Wave 3 で結線（クリック処理は JS で付与） -->
        <button type="button" class="paper-btn" data-size="a5" aria-pressed="true">A5</button>
        <button type="button" class="paper-btn" data-size="b6" aria-pressed="false">B6</button>
        <button type="button" class="print-btn">印刷</button>
      </div>
    </header>
    <main class="app-main">
      <textarea class="editor" spellcheck="false"></textarea>
      <div
        class="pane-divider"
        role="separator"
        aria-orientation="vertical"
        aria-label="エディタとプレビューの境界"
        tabindex="0"
      ></div>
      <section class="preview-pane">
        <div class="tategaki"></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
